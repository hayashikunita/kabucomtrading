<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Monitor - kabucomtrading</title>
    <style>
        :root {
            --bg: #0d1321;
            --panel: #1d2d44;
            --panel-2: #132238;
            --text: #f0ebd8;
            --muted: #8da9c4;
            --accent: #3e5c76;
            --accent-2: #748cab;
            --ok: #3fb950;
            --warn: #d29922;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 18px;
            font-family: "Consolas", "Monaco", monospace;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, #1b263b 0%, var(--bg) 58%);
            min-height: 100vh;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 22px;
            letter-spacing: 0.02em;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px;
            background: linear-gradient(145deg, var(--panel), var(--panel-2));
            border: 1px solid var(--accent);
            border-radius: 10px;
        }

        select,
        input,
        button {
            font-family: inherit;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid var(--accent-2);
            background: #0f1b2f;
            color: var(--text);
            padding: 8px 10px;
        }

        button {
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .badge {
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 999px;
            background: #0f1b2f;
            border: 1px solid var(--accent);
            color: var(--muted);
        }

        .badge.live {
            color: #fff;
            background: rgba(63, 185, 80, 0.15);
            border-color: var(--ok);
        }

        .badge.warn {
            color: #fff;
            background: rgba(210, 153, 34, 0.15);
            border-color: var(--warn);
        }

        #log {
            width: 100%;
            min-height: 65vh;
            border: 1px solid var(--accent);
            border-radius: 10px;
            background: #050b16;
            color: #c9d1d9;
            padding: 14px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 13px;
        }

        .link {
            color: #99c1ff;
            text-decoration: none;
            margin-left: 8px;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Terminal Output Monitor</h1>

    <div class="toolbar">
        <label for="file-select">監視ファイル</label>
        <select id="file-select"></select>

        <label for="line-count">初期表示行数</label>
        <input id="line-count" type="number" min="10" max="2000" value="200">

        <button id="reload-files">一覧更新</button>
        <button id="load-tail">末尾読込</button>
        <button id="start-live">ライブ開始</button>
        <button id="stop-live">ライブ停止</button>
        <button id="clear-log">クリア</button>

        <label>
            <input id="auto-scroll" type="checkbox" checked>
            自動スクロール
        </label>

        <a class="link" href="/">チャートへ戻る</a>
    </div>

    <div class="status-row">
        <span id="live-badge" class="badge warn">LIVE: OFF</span>
        <span id="file-badge" class="badge">FILE: -</span>
        <span id="position-badge" class="badge">POS: 0</span>
        <span id="message-badge" class="badge">準備中</span>
    </div>

    <pre id="log"></pre>

    <script>
        let source = null;
        let cursor = 0;

        const fileSelect = document.getElementById('file-select');
        const lineCountInput = document.getElementById('line-count');
        const logView = document.getElementById('log');
        const autoScroll = document.getElementById('auto-scroll');

        const liveBadge = document.getElementById('live-badge');
        const fileBadge = document.getElementById('file-badge');
        const positionBadge = document.getElementById('position-badge');
        const messageBadge = document.getElementById('message-badge');

        function setMessage(message, isWarn) {
            messageBadge.textContent = message;
            messageBadge.className = isWarn ? 'badge warn' : 'badge';
        }

        function setLiveState(active) {
            liveBadge.textContent = active ? 'LIVE: ON' : 'LIVE: OFF';
            liveBadge.className = active ? 'badge live' : 'badge warn';
        }

        function appendLog(text) {
            if (!text) return;
            logView.textContent += text;
            if (autoScroll.checked) {
                logView.scrollTop = logView.scrollHeight;
            }
        }

        function selectedFile() {
            return fileSelect.value || '';
        }

        async function loadFiles() {
            setMessage('ファイル一覧を取得中...', false);
            const res = await fetch('/api/terminal/files');
            const data = await res.json();
            const files = data.files || [];

            fileSelect.innerHTML = '';
            files.forEach((f) => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f;
                fileSelect.appendChild(opt);
            });

            if (files.length === 0) {
                setMessage('監視対象ファイルが見つかりません', true);
                fileBadge.textContent = 'FILE: -';
                return;
            }

            fileBadge.textContent = 'FILE: ' + selectedFile();
            setMessage('ファイル一覧を更新しました', false);
        }

        async function loadTail() {
            stopLive();

            const file = selectedFile();
            if (!file) {
                setMessage('監視ファイルを選択してください', true);
                return;
            }

            const lines = Number(lineCountInput.value || 200);
            setMessage('ログ末尾を読み込み中...', false);

            const url = '/api/terminal/tail?file=' + encodeURIComponent(file) + '&lines=' + encodeURIComponent(lines);
            const res = await fetch(url);
            const data = await res.json();

            if (!res.ok) {
                setMessage('読み込み失敗: ' + (data.error || 'unknown'), true);
                return;
            }

            logView.textContent = (data.lines || []).join('\n');
            if (logView.textContent.length > 0) {
                logView.textContent += '\n';
            }

            cursor = Number(data.position || 0);
            fileBadge.textContent = 'FILE: ' + data.file;
            positionBadge.textContent = 'POS: ' + cursor;
            setMessage('ログ末尾を表示しました', false);

            if (autoScroll.checked) {
                logView.scrollTop = logView.scrollHeight;
            }
        }

        function startLive() {
            stopLive();

            const file = selectedFile();
            if (!file) {
                setMessage('監視ファイルを選択してください', true);
                return;
            }

            const url = '/api/terminal/stream?file=' + encodeURIComponent(file) + '&position=' + encodeURIComponent(cursor);
            source = new EventSource(url);

            source.onopen = () => {
                setLiveState(true);
                setMessage('ライブ更新中', false);
            };

            source.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                appendLog(payload.text || '');
                cursor = Number(payload.position || cursor);
                positionBadge.textContent = 'POS: ' + cursor;
            };

            source.onerror = () => {
                setLiveState(false);
                setMessage('接続エラー。再開ボタンで再接続してください', true);
                if (source) {
                    source.close();
                    source = null;
                }
            };
        }

        function stopLive() {
            if (source) {
                source.close();
                source = null;
            }
            setLiveState(false);
        }

        document.getElementById('reload-files').addEventListener('click', loadFiles);
        document.getElementById('load-tail').addEventListener('click', loadTail);
        document.getElementById('start-live').addEventListener('click', startLive);
        document.getElementById('stop-live').addEventListener('click', stopLive);
        document.getElementById('clear-log').addEventListener('click', () => {
            logView.textContent = '';
        });
        fileSelect.addEventListener('change', () => {
            fileBadge.textContent = 'FILE: ' + selectedFile();
        });

        window.addEventListener('beforeunload', () => {
            stopLive();
        });

        (async function init() {
            try {
                await loadFiles();
                if (selectedFile()) {
                    await loadTail();
                }
            } catch (error) {
                setMessage('初期化エラー: ' + error, true);
            }
        })();
    </script>
</body>
</html>
